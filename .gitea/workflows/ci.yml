name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY_GITEA || 'gitea.groot.rocks' }}
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install ruff
          .venv/bin/pip install -r requirements.txt
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint with ruff (inkl. Security-Regeln)
        run: ruff check . --select E,F,W,S,B

      - name: Compile sources
        run: python -m compileall pfsense_backup.py

  build-and-push:
    runs-on: ubuntu-latest
    services:
      dind:
        image: docker:27-dind
        env:
          DOCKER_TLS_CERTDIR: ""
        options: >-
          --privileged
          --health-cmd "docker info"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DOCKER_HOST: tcp://dind:2375
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Docker daemon
        run: |
          for i in $(seq 1 30); do
            docker info >/dev/null 2>&1 && break
            echo "waiting for dind daemon... ($i)"
            sleep 2
          done
          docker info

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # network=host: Buildkit-Container nutzt die Netns des dind-Containers.
          # Das Entitlement erlaubt RUN-Steps mit Host-Network (siehe Build-Step),
          # damit sie DNS auflösen (embedded DNS -> erlaubte Hoster-Resolver).
          driver-opts: network=host
          buildkitd-flags: --allow-insecure-entitlement network.host

      # Login + Push nur außerhalb von Pull Requests (PR = nur Build-Validierung).
      - name: Log in to Gitea Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # RUN-Steps in der Host-Netns (dind) ausführen -> DNS funktioniert.
          network: host
          allow: network.host
